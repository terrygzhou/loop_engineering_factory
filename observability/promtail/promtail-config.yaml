server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: loop_factory

scrape_configs:
  - job_name: loop_factory
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: name
            values:
              - loop_factory-loop-1
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container_name
      - source_labels: ['__meta_docker_container_name']
        regex: '^/loop_factory-(.*)-[0-9]+$'
        target_label: service
        replacement: '${1}'
      - target_label: job
        replacement: loop_factory
