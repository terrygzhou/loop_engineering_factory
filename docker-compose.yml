services:
  # ─── Loop Engineering — unified container ──────────────────────
  loop:
    build: .
    ports:
      - "80:80"       # nginx — static frontend
      - "8011:8011"   # uvicorn — FastAPI backend
      - "8081:8081"   # health server — external health checks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_BASE_URL=http://pop-os:8080/v1
      - CHROMA_URL=http://chromadb:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
      - OTEL_SERVICE_NAME=loop-orchestrator
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - OBSERVABILITY_PORT=8081
      - PYTHONPATH=/app
    volumes:
      - skills_data:/root/.hermes/skills
      - build_data:/app/build
      - skill_data:/app/skills
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      - chromadb
      - otel-collector
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Builder: remote BUILD phase ─────────────────────────────────
  builder:
    build:
      context: .
      dockerfile: builder/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - LLM_BASE_URL=http://pop-os:8080/v1
    volumes:
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - build_data:/app/build
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped
    depends_on:
      - loop

  # ─── Data & Tooling ──────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    # Internal-only — no host port binding (port 8000 often in use)
    # Accessible via CHROMA_URL=http://chromadb:8000 inside container network
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ── Observability Stack ──

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector/config.yaml"]
    # No host port bindings — shares collector with other projects on 4317/4318
    # Use OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317/v1/traces
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector/config.yaml:ro
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_DATABASE_URI=/var/lib/phoenix/phoenix.db
      - PHOENIX_HOST=0.0.0.0
    volumes:
      - phoenix_data:/var/lib/phoenix
    restart: unless-stopped

  # ── OpenHands: AI agent for Gateway API (OpenAI-compatible) ──
  openhands:
    image: ghcr.io/openhands/agent-server:1.30.0-python
    container_name: openhands-server
    restart: unless-stopped
    ports:
      - "3005:8000"
    volumes:
      - ~/.openhands:/.openhands
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./output:/opt/workspace_base/output
    environment:
      - LLM_BASE_URL=http://host.docker.internal:8080/v1
      - LLM_MODEL=Qwen3.6-27B
      - OH_SECRET_KEY=changeme
      - SANDBOX_USER_ID=1000
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.30.0-python
      - WORKSPACE_BASE=/opt/workspace_base
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "pop-os:host-gateway"
    depends_on:
      - loop
  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/promtail.yaml:ro
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    # No host ports — internal-only, talks to Loki on grafana-stack network
    restart: unless-stopped
    networks:
      - loop_factory_default
      - grafana-stack_observability

volumes:
  chroma_data:
  skills_data:
  phoenix_data:
  build_data:
  skill_data:

# Bridge to the existing Grafana observability stack (Loki, Prometheus, Grafana)
networks:
  loop_factory_default:
    driver: bridge
  grafana-stack_observability:
    external: true
